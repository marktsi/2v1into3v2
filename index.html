<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2v1 → 3v2 Transition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0a0a;font-family:'Barlow',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:16px;color:#fff;}
  .header{text-align:center;margin-bottom:10px;}
  .header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;
    letter-spacing:2px;text-transform:uppercase;color:#C61D23;}
  .header p{font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
  .phase-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
    letter-spacing:2px;text-transform:uppercase;color:#fff;background:#C61D23;
    padding:4px 16px;margin-bottom:8px;min-width:300px;text-align:center;}

  .scene{position:relative;width:380px;height:540px;}

  /* Pitch */
  .pitch{position:absolute;inset:0;background:#1a5c1a;
    background-image:repeating-linear-gradient(180deg,transparent,transparent 54px,
      rgba(0,0,0,.05) 54px,rgba(0,0,0,.05) 108px);}
  .field-border{position:absolute;top:5px;left:5px;right:5px;bottom:5px;
    border:2px solid rgba(255,255,255,.6);pointer-events:none;}

  /* Penalty boxes — each is half the field */
  .box-top{position:absolute;left:52px;right:52px;top:5px;height:262px;
    border:2px solid rgba(255,255,255,.45);border-top:none;pointer-events:none;}
  .box-bot{position:absolute;left:52px;right:52px;bottom:5px;height:262px;
    border:2px solid rgba(255,255,255,.45);border-bottom:none;pointer-events:none;}

  /* 6-yard boxes */
  .six-top{position:absolute;left:140px;right:140px;top:5px;height:65px;
    border:2px solid rgba(255,255,255,.35);border-top:none;pointer-events:none;}
  .six-bot{position:absolute;left:140px;right:140px;bottom:5px;height:65px;
    border:2px solid rgba(255,255,255,.35);border-bottom:none;pointer-events:none;}

  /* Penalty spots */
  .pspot{position:absolute;left:50%;width:5px;height:5px;
    background:rgba(255,255,255,.5);border-radius:50%;transform:translateX(-50%);}

  /* 36-yard line */
  .yard-line{position:absolute;left:5px;right:5px;top:267px;height:2px;
    background:rgba(255,255,255,.55);}
  .yard-lbl{position:absolute;left:8px;top:270px;
    font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;
    text-transform:uppercase;color:rgba(255,255,255,.32);}

  /* Small goals ON 36-yard line — open upward (blues attack upward through them) */
  .sg{position:absolute;width:22px;height:14px;
    border:2.5px solid rgba(255,255,255,.9);border-bottom:none;
    background:rgba(255,255,255,.1);top:254px;}

  /* Big goal at bottom */
  .big-goal{position:absolute;left:153px;right:153px;bottom:5px;height:18px;
    border:3px solid rgba(255,255,255,.9);border-top:none;
    background:rgba(255,255,255,.08);}

  /* Queue area labels */
  .q-lbl{position:absolute;font-family:'Barlow Condensed',sans-serif;
    font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:rgba(255,255,255,.28);}

  /* Penalty arc SVGs */
  .arc-svg{position:absolute;top:0;left:0;width:380px;height:540px;pointer-events:none;}

  /* Queue dots */
  .qdot{position:absolute;width:11px;height:11px;border-radius:50%;opacity:.6;z-index:3;}
  .qdot.red{background:#C61D23;}
  .qdot.blue{background:#1a6eb5;}

  /* Players */
  .player{position:absolute;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#fff;
    border:2px solid rgba(255,255,255,.22);
    transition:left .82s cubic-bezier(.4,0,.2,1),top .82s cubic-bezier(.4,0,.2,1),opacity .45s;
    z-index:10;}
  .player.red {background:#C61D23;box-shadow:0 0 9px rgba(198,29,35,.5);}
  .player.blue{background:#1a6eb5;box-shadow:0 0 9px rgba(26,110,181,.5);}
  .player.gk  {background:#d07000;border-radius:4px;font-size:9px;
    box-shadow:0 0 8px rgba(208,112,0,.5);}
  .player.coach{background:#333;border-color:rgba(255,255,255,.5);font-size:10px;}
  .player.has-ball{border-color:#fff;border-width:3px;}

  .ball{position:absolute;width:14px;height:14px;border-radius:50%;
    background:#fff;border:1px solid #ccc;z-index:20;
    transition:left .82s cubic-bezier(.4,0,.2,1),top .82s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 9px rgba(255,255,255,.9);}

  /* SVG arrows */
  .arr{position:absolute;top:0;left:0;width:380px;height:540px;pointer-events:none;z-index:8;}

  /* Scenario badge */
  .scen-badge{position:absolute;right:10px;top:10px;z-index:25;
    font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;
    letter-spacing:2px;padding:4px 12px;
    color:#fff;border-radius:2px;opacity:0;transition:opacity .4s;white-space:nowrap;}
  .scen-badge.show{opacity:1;}

  .legend{display:flex;gap:14px;margin-top:8px;justify-content:center;}
  .leg{display:flex;align-items:center;gap:5px;font-size:10px;color:#aaa;
    font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
  .ld{width:12px;height:12px;border-radius:50%;}
  .ld.red{background:#C61D23;}.ld.blue{background:#1a6eb5;}
  .ld.gk{background:#d07000;border-radius:2px;}

  .step-indicators{display:flex;gap:6px;margin-top:8px;}
  .step-dot{width:7px;height:7px;border-radius:50%;background:#222;transition:background .3s;}
  .step-dot.active{background:#C61D23;}.step-dot.done{background:#444;}

  .desc{font-size:11px;color:#555;text-align:center;max-width:380px;
    margin-top:6px;line-height:1.5;min-height:30px;}

  .controls{display:flex;gap:8px;margin-top:10px;}
  .btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;
    border:none;cursor:pointer;transition:all .2s;}
  .btnp{background:#C61D23;color:#fff;}.btnp:hover{background:#e02228;}
  .btns{background:transparent;color:#555;border:1px solid #222;}
  .btns:hover{border-color:#555;color:#bbb;}

  /* TSI Logo */
  .tsi-logo-wrap{display:flex;justify-content:center;padding:0 0 12px;width:100%;}
  .tsi-logo{height:38px;width:auto;display:block;}
</style>
</head>

<script>
const pp = (cx,cy)=>[cx-13,cy-13];
const bb = (cx,cy)=>[cx-7,cy-7];
function arw(fx,fy,tx,ty){
  const dx=tx-fx,dy=ty-fy,len=Math.sqrt(dx*dx+dy*dy)||1;
  const ox=dx/len*15,oy=dy/len*15;
  return `M${fx+ox},${fy+oy} L${tx-ox},${ty-oy}`;
}

// Round 1: server at 36-yard line centre → R1 receives near top, runs down to shoot
document.getElementById('aServe').setAttribute('d',   arw(190,267, 190,155));  // server → R1
document.getElementById('aR1down').setAttribute('d',  arw(190,155, 190,430));  // R1 runs to goal

// Round 2: Blues enter from bottom queue, attack upward toward small goals
// B1 → left small goal (x=125), B2 → right small goal (x=255)
document.getElementById('aB1up').setAttribute('d',    arw(100,525, 125,267));
document.getElementById('aB2up').setAttribute('d',    arw(265,525, 255,267));

// Transition: R2 (waiting at x=125, y=38) + R3 (x=255, y=38) step DOWN through small goals
document.getElementById('aR2down').setAttribute('d',  arw(125,235, 140,310));
document.getElementById('aR3down').setAttribute('d',  arw(255,235, 250,310));

// 3v2: 3 reds drive down toward big goal; blues drop back to defend
document.getElementById('aR1att').setAttribute('d',   arw(188,298, 185,400));
document.getElementById('aR2att').setAttribute('d',   arw(140,305, 115,415));
document.getElementById('aR3att').setAttribute('d',   arw(250,305, 268,412));
document.getElementById('aB1def').setAttribute('d',   arw(100,310, 155,410));
document.getElementById('aB2def').setAttribute('d',   arw(270,305, 240,408));

// Coach feeds — horizontal pass from right side to server at centre
document.getElementById('aCoach1').setAttribute('d', arw(376,267, 198,267));
document.getElementById('aCoach2').setAttribute('d', arw(376,267, 198,267));
document.getElementById('aCoach3').setAttribute('d', arw(376,267, 198,267));

// ── DOM ────────────────────────────────────────────────────────────────
const scene = document.querySelector('.scene');
const pEls = {};
PH[0].players.forEach(p=>{
  const el=document.createElement('div');
  el.id=p.id; el.className=p.cls; el.textContent=p.lbl;
  scene.appendChild(el); pEls[p.id]=el;
});
const ballEl=document.createElement('div');
ballEl.className='ball'; scene.appendChild(ballEl);

const ALL_ARR=['aServe','aR1down','aB1up','aB2up','aR2down','aR3down',
               'aR1att','aR2att','aR3att','aB1def','aB2def',
               'aCoach1','aCoach2','aCoach3'];

// ── Render ─────────────────────────────────────────────────────────────
let current=0,isAuto=false,timer=null;

function applyPhase(idx){
  const ph=PH[idx];
  ph.players.forEach(p=>{
    const el=pEls[p.id]; if(!el) return;
    el.className=p.cls;
    el.style.left=p.pos[0]+'px'; el.style.top=p.pos[1]+'px';
    el.style.opacity=p.vis?'1':'0';
  });
  ballEl.style.left=ph.ball[0]+'px'; ballEl.style.top=ph.ball[1]+'px';

  ALL_ARR.forEach(id=>
    document.getElementById(id).setAttribute('opacity',
      ph.arrows.includes(id)?'0.88':'0'));

  const sb=document.getElementById('scenBadge');
  sb.textContent=ph.scen;
  sb.style.background=ph.scenCol||'transparent';
  sb.classList.toggle('show',!!ph.scen);

  document.getElementById('phaseLabel').textContent=ph.label;
  document.getElementById('desc').textContent=ph.desc;
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active',i===idx);
    d.classList.toggle('done',i<idx);
  });
  document.getElementById('prevBtn').style.opacity=idx===0?'0.3':'1';
  document.getElementById('nextBtn').style.opacity=idx===PH.length-1?'0.3':'1';
}

function go(dir){
  const n=Math.max(0,Math.min(PH.length-1,current+dir));
  if(n!==current){current=n;applyPhase(current);}
  if(current===PH.length-1&&isAuto) stopAuto();
}
function toggleAuto(){
  if(isAuto){stopAuto();return;}
  isAuto=true;document.getElementById('playBtn').textContent='⏸ Pause';
  if(current===PH.length-1){current=0;applyPhase(0);}
  timer=setInterval(()=>{
    if(current<PH.length-1){current++;applyPhase(current);}
    else stopAuto();
  },2500);
}
function stopAuto(){
  isAuto=false;clearInterval(timer);
  document.getElementById('playBtn').textContent='▶ Auto';
}

PH.forEach((_,i)=>{
  const d=document.createElement('div');d.className='step-dot';
  document.getElementById('stepDots').appendChild(d);
});
applyPhase(0);
</script>
